</style>

<script>
(function(){
  var PRIVAT_OPTS=['Elinstallation','Belysning','KûÑk och badrum','Laddbox','Energi & effekt','Elfel','Annat'];
  var ORG_OPTS=['StûÑrre elinstallation','Belysning','Laddbox','Service & underhûËll','Elbesiktning','Energi & effekt','Elfel','Annat'];
  var SERVICE={vitvaror:'Vitvaror',utomhusbelysning:'Utomhusbelysning',strombrytare:'StrûÑmbrytare','ugn-spis':'Ugn & spis',spotlights:'Spotlights','smarta-hem':'Smarta hem',luftvarmepump:'LuftvûÊrmepump',lastbalansering:'Lastbalansering',kok:'El i kûÑk',koksrenovering:'KûÑksrenovering',inomhusbelysning:'Inomhusbelysning',jordfelsbrytare:'Jordfelsbrytare',glodlampa:'GlûÑdlampor',golvvarme:'GolvvûÊrme','felsokning-av-el':'FelsûÑkning av el',elrenovering:'Elrenovering',elcentral:'Byte av elcentral',elbesiktning:'Elbesiktning',belysning:'Belysning',badrumsrenovering:'Badrumsrenovering',armatur:'Armatur',badrum:'El i badrum'};
  var EFX={
    villor:{kundtyp:'privat',label:'el till din villa',vertical:'service',opts:PRIVAT_OPTS},
    radhus:{kundtyp:'privat',label:'el till ditt radhus',vertical:'service',opts:PRIVAT_OPTS},
    restauranger:{kundtyp:'foretag',label:'el till er restaurang',vertical:'foretag_brf',opts:['StorkûÑk / flûÊkt / trefas','StûÑrre elinstallation','Belysning','Service & underhûËll','Elfel','Laddbox','Annat']},
    hotell:{kundtyp:'foretag',label:'el till ert hotell',vertical:'foretag_brf',opts:['StûÑrre elinstallation','Belysning','Laddbox','Service & underhûËll','Energi & effekt','Elbesiktning','Elfel','Annat']},
    kontor:{kundtyp:'foretag',label:'el till ert kontor',vertical:'foretag_brf',opts:['StûÑrre elinstallation','Belysning','Laddbox','Service & underhûËll','Elfel','Annat']},
    butik:{kundtyp:'foretag',label:'el till er butik',vertical:'foretag_brf',opts:['Belysning','StûÑrre elinstallation','Service & underhûËll','Laddbox','Elfel','Annat']},
    kommuner:{kundtyp:'foretag',label:'el till er kommun',vertical:'foretag_brf',orgLabel:'FûÑrvaltning/enhet',opts:['StûÑrre elinstallation','Belysning','Elbesiktning','Laddbox','Service & underhûËll','Energi & effekt','Elfel','Annat']},
    idrottshallar:{kundtyp:'foretag',label:'el till er idrottshall',vertical:'foretag_brf',opts:['StûÑrre elinstallation','Belysning','Energi & effekt','Service & underhûËll','Elbesiktning','Elfel','Annat']},
    foretag:{kundtyp:'foretag',label:'el till ert fûÑretag',vertical:'foretag_brf',opts:ORG_OPTS},
    byggforetag:{kundtyp:'foretag',label:'el i era byggprojekt',vertical:'foretag_brf',opts:['StûÑrre elinstallation','Elbesiktning','Belysning','Service & underhûËll','Elfel','Annat']},
    entreprenad:{kundtyp:'foretag',label:'el i ert entreprenaduppdrag',vertical:'foretag_brf',opts:['StûÑrre elinstallation','Elbesiktning','Belysning','Laddbox','Service & underhûËll','Annat']},
    bostadsrattsforening:{kundtyp:'brf',label:'el till er fûÑrening',vertical:'foretag_brf',opts:['Laddbox','StûÑrre elinstallation','Belysning','Elbesiktning','Service & underhûËll','Energi & effekt','Elfel','Annat']},
    tredjepartsinstallationer:{kundtyp:'foretag',label:'tredjepartsinstallation',vertical:'foretag_brf',opts:['StûÑrre elinstallation','Laddbox','Belysning','Service & underhûËll','Elbesiktning','Elfel','Annat']}
  };
  var SV_ORT={nacka:'Nacka',sodertalje:'SûÑdertûÊlje',sollentuna:'Sollentuna',taby:'TûÊby',jarfalla:'JûÊrfûÊlla',vaxholm:'Vaxholm',varmdo:'VûÊrmdûÑ',vallingby:'VûÊllingby',huddinge:'Huddinge',solna:'Solna',stockholm:'Stockholm','upplands-vasby':'Upplands VûÊsby',tyreso:'TyresûÑ',lidingo:'LidingûÑ',osteraker:'ûsterûËker',bromma:'Bromma',sundbyberg:'Sundbyberg'};
  var HERO={service:{eb:'Professionell elservice',h2:'El av behûÑrig elektriker',crumb:'Elservice'},laddbox:{eb:'Laddbox',h2:'Laddbox med installation',crumb:'Laddbox'},foretag_brf:{eb:'FûÑr verksamheter',h2:'El till er verksamhet',crumb:'Elektriker fûÑr'},oklart:{eb:'Ampy',h2:'BehûÑrig elektriker',crumb:'Ampy'}};
  var UTIL=['/offert','/kopvillkor','/integritetspolicy','/cookiepolicy','/thank-you','/nyheter','/tillganglighet','/om-oss'];
  function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
  function ortName(slug){return SV_ORT[slug]||slug.split('-').map(cap).join(' ');}

  function resolve(p){
    p=('/'+String(p).trim().replace(/^https?:\/\/[^/]+/,'').replace(/^\/+|\/+$/g,'')).replace(/\/+$/,'');
    if(p==='')p='/';
    if(/^\/eljour\//.test(p)) return {render:false,reason:'Eljour = telefon-fûÑrst-block (Ring 010-265 79 79 + "112 fûÑrst"), inget offertformulûÊr.',vertical:'-'};
    if(/^\/solcellsbatterier(\/|$)/.test(p)||/^\/laddboxar\//.test(p)||/^\/batterilagring(\/|$)/.test(p)) return {render:false,reason:'Produktsida ã annan flow (CRM Form 2), inget offertformulûÊr hûÊr.',vertical:'-'};
    if(UTIL.indexOf(p)>-1) return {render:false,reason:'Utility-sida ã inget formulûÊr.',vertical:'-'};
    var m;
    if(m=p.match(/^\/elservice\/([^/]+)$/)){var lbl=SERVICE[m[1]]; if(lbl) return {render:true,kundtyp:'privat',tjanst:lbl,tjanstLocked:true,vertical:'service',source:p};}
    if(p==='/elservice') return {render:true,kundtyp:'privat',ask:true,vertical:'service',source:p};
    var efx=EFX[p.replace(/^\//,'')]; if(efx) return {render:true,kundtyp:efx.kundtyp,kundtypLocked:true,ask:true,opts:efx.opts,label:efx.label,orgLabel:efx.orgLabel,vertical:efx.vertical,source:p};
    if(m=p.match(/^\/laddbox\/([^/]+)$/)) return {render:true,kundtyp:'privat',tjanst:'Laddbox',tjanstLocked:true,ort:ortName(m[1]),vertical:'laddbox',source:p};
    if(m=p.match(/^\/elinstallation\/([^/]+)$/)) return {render:true,kundtyp:'privat',tjanst:'Elinstallation',tjanstLocked:true,ort:ortName(m[1]),vertical:'service',source:p};
    if(m=p.match(/^\/elektriker\/([^/]+)$/)) return {render:true,kundtyp:'privat',ask:true,ort:ortName(m[1]),vertical:'service',source:p};
    if(p==='/elektriker') return {render:true,kundtyp:'privat',ask:true,vertical:'service',source:p};
    if(p==='/laddbox') return {render:true,kundtyp:'privat',tjanst:'Laddbox',tjanstLocked:true,vertical:'laddbox',source:p};
    if(p==='/elinstallation') return {render:true,kundtyp:'privat',tjanst:'Elinstallation',tjanstLocked:true,vertical:'service',source:p};
    return {render:true,kundtyp:'privat',ask:true,vertical:'oklart',source:p};
  }

  var SEG={privat:'Privat',brf:'BRF',foretag:'FûÑretag'};
  var st={path:'/laddbox/nacka',view:'desktop',seg:'privat',open:false,cfg:null};
  var block=document.getElementById('block'),dbg=document.getElementById('dbg');
  var QUICK=['/laddbox/nacka','/elservice/golvvarme','/elservice/elcentral','/elektriker/sodertalje','/elinstallation/taby','/restauranger','/bostadsrattsforening','/villor','/kommuner','/elektriker','/eljour/solna','/solcellsbatterier/sonnen'];

  function fld(label,id,type,opt,req){var im=type==='tel'?' inputmode="tel"':(type==='num'?' inputmode="numeric"':'');var t=type==='num'?'text':type;
    return '<div class="fld"><label class="l" for="'+id+'">'+label+(opt?' <span class="opt">(valfritt)</span>':'')+(req?' <span class="reqtag">krûÊvs</span>':'')+'</label><input class="inp" id="'+id+'" type="'+t+'"'+im+'></div>';}
  function seg(){return '<div class="seg" role="radiogroup" aria-label="Kundtyp">'+['privat','brf','foretag'].map(function(k){return '<button type="button" role="radio" data-seg="'+k+'" aria-checked="'+(st.seg===k)+'">'+SEG[k]+'</button>';}).join('')+'</div>';}
  function orgFields(cfg){ if(st.seg==='privat') return ''; var nameLabel=st.seg==='brf'?'FûÑreningens namn':(cfg.orgLabel||'FûÑretagsnamn');
    return fld(nameLabel,'orgname','text',false,true)+fld('Organisationsnummer','orgnr','num',false,true); }
  function tjanstBlock(cfg){
    var chip = cfg.tjanstLocked ? ('GûÊller: '+cfg.tjanst+(cfg.ort?' ôñ '+cfg.ort:'')) : cfg.label ? ('GûÊller: '+cfg.label) : cfg.ort ? ('Elektriker i '+cfg.ort) : null;
    var html = chip ? '<div class="gchip"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12l5 5L20 7"/></svg><span>'+chip+'</span></div>' : '';
    if(cfg.ask){ var opts=cfg.opts||(st.seg==='privat'?PRIVAT_OPTS:ORG_OPTS);
      html+='<div class="fld"><label class="l" for="tj">Vad gûÊller arbetet?</label><select class="inp" id="tj">'+opts.map(function(o){return '<option>'+o+'</option>';}).join('')+'</select></div>'; }
    return html;
  }
  function enrich(){return fld('E-post','epost','email',true)+'<div class="fld"><label class="l">Beskriv uppdraget <span class="opt">(valfritt)</span></label><textarea class="inp" id="beskriv"></textarea></div>'+fld('Adress','adress','text',true)+'<div class="fld"><label class="l">Tidsram <span class="opt">(valfritt)</span></label><select class="inp"><option value="">VûÊlj tidsram</option><option>Inom 24 timmar</option><option>Inom 72 timmar</option><option>Om 1-2 veckor</option><option>Flexibelt</option></select></div><div class="fld"><label class="l">Bilder <span class="opt">(valfritt)</span></label><div class="upload">Ladda upp bilder</div></div>';}
  function consent(){return '<label class="consent"><input type="checkbox"><span>Jag godkûÊnner att Ampy behandlar mina uppgifter, enligt <a href="https://ampy.se/integritetspolicy" target="_blank" rel="noopener">integritetspolicyn</a>.</span></label>';}
  function formCard(cfg){
    return '<div class="card"><h1 class="title">FûË kostnadsfri rûËdgivning!</h1><p class="subtitle">TjûÊnsten ûÊr helt gratis och du binder dig inte!</p>'+
      '<form novalidate><div class="group">'+seg()+'</div>'+
      '<div class="group">'+tjanstBlock(cfg)+orgFields(cfg)+fld('Namn','namn','text',false)+'<div class="row2">'+fld('Telefon','telefon','tel',false)+fld('Postnummer','postnr','num',false)+'</div></div>'+
      '<div class="disc" data-open="'+st.open+'"><button type="button" data-act="toggle">Fler detaljer (valfritt)<svg class="chev ic" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 8l5 5 5-5"/></svg></button><div class="disc-body"><div class="group">'+enrich()+'</div></div></div>'+
      consent()+'<button type="button" class="btn btn-primary" data-act="submit">Boka rûËdgivning</button></form></div>';
  }
  function noformCard(cfg){return '<div class="noform"><b>Inget offertformulûÊr pûË den hûÊr sidan.</b><br>'+cfg.reason+'</div>';}
  function left(cfg){var h=HERO[cfg.vertical]||HERO.oklart;var eb=cfg.ort?(h.eb+' i '+cfg.ort):h.eb;
    return '<div class="left"><p class="eb">'+eb+'</p><h1>'+h.h2+'</h1><p>SûÊkra ditt hem med behûÑrig elektriker. Detta hero-block ûÊr befintlig kontext fûÑr att visa passform.</p>'+
      '<div class="ctas"><a class="c1" href="#" onclick="return false">Kontakta oss</a><a class="c2" href="#" onclick="return false">010-265 79 79</a></div>'+
      '<div class="rate"><span class="g">G</span><span>5.0</span><span class="st">ããããã</span></div></div>';}
  function crumbOf(cfg){var h=HERO[cfg.vertical]||HERO.oklart;return h.crumb;}

  function render(){
    var cfg=resolve(st.path); st.cfg=cfg;
    block.innerHTML='<p class="crumb">Hem <b>ã¤</b> '+crumbOf(cfg)+'</p><div class="hero">'+left(cfg)+'<div class="formcol">'+(cfg.render?formCard(cfg):noformCard(cfg))+'</div></div>';
    dbg.textContent='resolve("'+cfg.source||st.path+'") ã '+JSON.stringify({render:cfg.render,vertical:cfg.vertical,kundtyp:cfg.render?st.seg:'-',kundtypLûËst:!!cfg.kundtypLocked,tjûÊnst:cfg.tjanstLocked?cfg.tjanst:(cfg.ask?'FRûGAS':'-'),ort:cfg.ort||'-',orgNrKrûÊvs:(cfg.render&&st.seg!=='privat')});
    mark('view','view',st.view); document.body.classList.toggle('m',st.view==='mob');
  }
  function mark(id,attr,val){var g=document.getElementById(id);Array.prototype.forEach.call(g.children,function(b){if(b.dataset[attr]!==undefined)b.classList.toggle('act',b.dataset[attr]===val);});}
  function setPath(p){st.path=p;var c=resolve(p);st.seg=c.render?c.kundtyp:'privat';st.open=false;document.getElementById('urlpath').value=p;render();}

  document.getElementById('go').addEventListener('click',function(){setPath(document.getElementById('urlpath').value);});
  document.getElementById('urlpath').addEventListener('keydown',function(e){if(e.key==='Enter')setPath(this.value);});
  document.getElementById('view').addEventListener('click',function(e){var b=e.target.closest('[data-view]');if(b){st.view=b.dataset.view;render();}});
  var q=document.getElementById('quick'); QUICK.forEach(function(u){var b=document.createElement('button');b.textContent=u;b.onclick=function(){setPath(u);};q.appendChild(b);});
  block.addEventListener('click',function(e){var sb=e.target.closest('[data-seg]');if(sb){st.seg=sb.dataset.seg;render();return;}var a=e.target.closest('[data-act]');if(a&&a.dataset.act==='toggle'){st.open=!st.open;render();}});

  setPath('/laddbox/nacka');
})();
