<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ampy offertformulär — granskning (per-sida-resolver)</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;background:#0a0c1e;font-family:system-ui,-apple-system,sans-serif;color:#cfd3e6}
.bar{position:sticky;top:0;z-index:5;background:#11132c;border-bottom:1px solid rgba(255,255,255,.08);padding:12px 18px}
.row{display:flex;flex-wrap:wrap;gap:8px 14px;align-items:center}
.lab{color:#7e85a8;font-size:12px}
input.url{font:14px system-ui;border:1px solid rgba(255,255,255,.16);background:#0a0c1e;color:#fff;border-radius:8px;padding:8px 12px;width:300px}
button{font:13px system-ui;border:1px solid rgba(255,255,255,.12);background:#181b38;color:#cfd3e6;border-radius:8px;padding:7px 12px;cursor:pointer}
button.act{background:#fff;color:#11132c;border-color:transparent;font-weight:600}
.grp{display:flex;gap:4px;background:#0a0c1e;padding:4px;border-radius:10px}
.quick{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.quick button{background:#181b38;color:#aeb4d6;font-size:12.5px}
.note{font-size:12px;color:#6b7299;margin:9px 0 0}
.note code{color:#7fe9d3}
.stage{display:flex;justify-content:center;padding:18px}
iframe{width:100%;max-width:1000px;height:840px;border:1px solid rgba(255,255,255,.10);border-radius:16px;background:#0a0c1e}
.stage.mob iframe{max-width:390px}
</style>
</head>
<body>
<div class="bar">
  <div class="row">
    <span class="lab">URL-path:</span>
    <input class="url" id="urlpath" value="/laddbox/nacka">
    <button id="go">Testa</button>
    <span class="lab">Vy:</span>
    <div class="grp" id="view"><button data-view="desktop" class="act">Desktop</button><button data-view="mob">Mobil</button></div>
  </div>
  <div class="quick" id="quick"></div>
  <p class="note">Granskningsharness — iframen laddar <code>bricks/ampy-offert-form.html</code> (PRODUKTIONSKODEN) med vald path. Skriv valfri Ampy-path eller välj nedan. Mobil-vyn smalnar iframen så formulärets riktiga <code>@media</code> slår in.</p>
</div>
<div class="stage" id="stage">
  <iframe id="frame" title="Ampy offertformulär" src="bricks/ampy-offert-form.html?path=%2Fladdbox%2Fnacka"></iframe>
</div>
<script>
(function(){
  var QUICK=['/laddbox/nacka','/elservice/golvvarme','/elservice/elcentral','/elektriker/sodertalje','/elinstallation/taby','/restauranger','/hotell','/bostadsrattsforening','/kommuner','/villor','/elektriker','/eljour/solna','/solcellsbatterier/sonnen'];
  var frame=document.getElementById('frame'),inp=document.getElementById('urlpath'),stage=document.getElementById('stage');
  function load(p){p=p.trim();inp.value=p;frame.src='bricks/ampy-offert-form.html?path='+encodeURIComponent(p);}
  document.getElementById('go').addEventListener('click',function(){load(inp.value);});
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')load(inp.value);});
  var q=document.getElementById('quick');QUICK.forEach(function(u){var b=document.createElement('button');b.textContent=u;b.onclick=function(){load(u);};q.appendChild(b);});
  document.getElementById('view').addEventListener('click',function(e){var b=e.target.closest('[data-view]');if(!b)return;stage.classList.toggle('mob',b.dataset.view==='mob');Array.prototype.forEach.call(this.children,function(x){x.classList.toggle('act',x===b);});});
})();
</script>
</body>
</html>
